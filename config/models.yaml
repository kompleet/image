# ============================================================================
#  Atelier — Bibliothèque de modèles
# ----------------------------------------------------------------------------
#  Source unique de vérité : téléchargement à la demande, recommandations selon
#  le matériel, et réglages automatiques par modèle (steps/cfg/sampler/...).
#
#  Jokers dans `match` :
#    {quant}     -> quantification du modèle de diffusion (selon VRAM)
#    {enc_quant} -> quantification de l'encodeur de texte (selon RAM, en offload)
#  Le téléchargeur interroge l'API Hugging Face et choisit le meilleur fichier.
# ============================================================================

base_models:

  # --------------------------------------------------------------------------
  - id: sdxl-realvis
    name: "SDXL — RealVisXL V5.0"
    family: sdxl
    tags: [photoréalisme, polyvalent, controlnet]
    description: >
      SDXL photoréaliste haut de gamme (RealVisXL V5.0). Checkpoint complet
      unique (CLIP + VAE inclus), ~6,5 Go — tient en VRAM dès 8 Go, pas
      d'encodeur séparé. Modèle « eps » classique : DPM++ 2M + Karras.
    sources:
      # Checkpoint SDXL complet (un seul fichier via -m). Remplaçable par un
      # autre SDXL (Juggernaut, etc.) dans models/custom/ ou ici.
      model:
        repo: SG161222/RealVisXL_V5.0
        match: "RealVisXL_V5.0_fp16.safetensors"
    defaults:
      steps: 30
      cfg_scale: 5.0
      sampler: dpm++2m
      scheduler: karras
      width: 1024
      height: 1024
      supports_negative: true
    presets:
      - {name: "📷 Photoréaliste (recommandé)", sampler: dpm++2m, scheduler: karras, steps: 30, cfg_scale: 5.0}
      - {name: "Net (dpm++ 2M)",                sampler: dpm++2m, scheduler: karras, steps: 25, cfg_scale: 6.0}
      - {name: "Rapide (euler a)",              sampler: euler_a, scheduler: karras, steps: 22, cfg_scale: 6.0}
    vram_min_gb: 8

  # --------------------------------------------------------------------------
  - id: flux2-klein-9b
    name: "Flux.2 Klein 9B"
    family: flux2
    tags: [qualité, rapide, distillé]
    description: >
      FLUX.2 Klein 9B en GGUF (distillé, rapide : 4 pas, CFG 1.0). Très haute
      qualité d'image. Diffusion Q4 ≈ 5 Go en VRAM ; encodeur Qwen3-8B déchargé
      en RAM. Tourne sur 10–12 Go de VRAM.
    sources:
      diffusion:
        repo: unsloth/FLUX.2-klein-9B-GGUF
        match: "*klein-9B*{quant}.gguf"
        quantizable: true
      vae:
        # Autoencodeur flux2_ae (dépôt HF qui l'héberge).
        repo: Comfy-Org/Ideogram-4
        match: "vae/*.safetensors"
      text_encoder:
        repo: unsloth/Qwen3-8B-GGUF
        match: "Qwen3-8B-{enc_quant}.gguf"
        quantizable: true
    defaults:
      steps: 4
      cfg_scale: 1.0
      sampler: euler
      scheduler: simple
      width: 1024
      height: 1024
      supports_negative: false
    presets:
      - {name: "⚡ Rapide (recommandé)", sampler: euler,         scheduler: simple, steps: 4,  cfg_scale: 1.0}
      - {name: "Équilibré (res ms)",     sampler: res_multistep, scheduler: simple, steps: 6,  cfg_scale: 1.0}
      - {name: "Qualité (dpm++ 2M)",     sampler: dpm++2m,       scheduler: simple, steps: 10, cfg_scale: 1.0}
    vram_min_gb: 10

# ============================================================================
#  Upscalers (PyTorch, installés à la demande via scripts/setup_upscalers.py)
# ============================================================================
upscalers:

  - id: drct-l
    name: "4x DRCT-L"
    engine: spandrel
    tags: [classique, transformer, ×4, net]
    description: >
      DRCT-L ×4 (transformer dense). Upscaler « classique » net et polyvalent,
      chargé via spandrel. PyTorch, pas de flash-attn.
    pip_package: spandrel
    model_url: "https://drive.google.com/uc?id=1bVxvA6QFbne2se0CQJ-jyHFy94UOi3h5"
    model_file: "4x-DRCT-L_X4.pth"
    vram_min_gb: 8

  - id: nomos2-drct-l
    name: "4x Nomos2 HQ DRCT-L"
    engine: spandrel
    tags: [classique, transformer, ×4, photo]
    description: >
      DRCT-L finetuné sur Nomos2 (photos haute qualité), par Phhofm. Chargé via
      spandrel. PyTorch, pas de flash-attn.
    pip_package: spandrel
    model_url: "https://github.com/Phhofm/models/releases/download/4xNomos2_hq_drct-l/4xNomos2_hq_drct-l.safetensors"
    model_file: "4xNomos2_hq_drct-l.safetensors"
    vram_min_gb: 8
