# ============================================================================
#  Atelier — Bibliothèque de modèles
# ----------------------------------------------------------------------------
#  Source unique de vérité : téléchargement à la demande, recommandations selon
#  le matériel, et réglages automatiques par modèle (steps/cfg/sampler/...).
#
#  Jokers dans `match` :
#    {quant}     -> quantification du modèle de diffusion (selon VRAM)
#    {enc_quant} -> quantification de l'encodeur de texte (selon RAM, en offload)
#  Le téléchargeur interroge l'API Hugging Face et choisit le meilleur fichier.
# ============================================================================

base_models:

  # --------------------------------------------------------------------------
  - id: zimage-turbo
    name: "Z-Image Turbo"
    family: zimage
    tags: [turbo, rapide, polyvalent]
    description: >
      Modèle « Turbo » très rapide (8 étapes, CFG 1.0). Excellent rapport
      vitesse/qualité, idéal pour itérer. Recommandé en premier sur petite VRAM.
    sources:
      diffusion:
        repo: unsloth/Z-Image-Turbo-GGUF
        match: "Z-Image-Turbo-{quant}.gguf"
        quantizable: true
      vae:
        repo: Comfy-Org/z_image_turbo
        match: "split_files/vae/*.safetensors"
      text_encoder:
        repo: Qwen/Qwen3-4B-GGUF
        match: "Qwen3-4B-{enc_quant}.gguf"
        quantizable: true
    defaults:
      steps: 8
      cfg_scale: 1.0
      sampler: euler
      scheduler: auto
      width: 1024
      height: 1024
      supports_negative: false
    vram_min_gb: 6

  # --------------------------------------------------------------------------
  - id: ideogram-4
    name: "Ideogram 4"
    family: ideogram
    tags: [qualité, typographie, affiches]
    description: >
      Modèle haut de gamme, excellent en composition et en texte dans l'image.
      Plus lourd (encodeur Qwen3-VL-8B). Conseillé à partir de ~10 Go de VRAM.
    sources:
      # Le dépôt leejet/ideogram-4-GGUF ne propose qu'un seul quant : Q4_0
      # (diffusion + uncond, ~5,6 Go chacun). On pointe dessus directement.
      diffusion:
        repo: leejet/ideogram-4-GGUF
        match: "ideogram4-Q4_0.gguf"
      uncond:
        repo: leejet/ideogram-4-GGUF
        match: "ideogram4_uncond-Q4_0.gguf"
      vae:
        repo: Comfy-Org/Ideogram-4
        match: "vae/*.safetensors"
      text_encoder:
        # Encodeur vision-langage ; on ne prend que la partie texte (pas le mmproj).
        repo: unsloth/Qwen3-VL-8B-Instruct-1M-GGUF
        match: "*{enc_quant}.gguf"
        quantizable: true
    defaults:
      # Doc officielle : guidance ~7.0, ~20 pas (preset V4_DEFAULT_20),
      # sampler Euler (flow-matching). CFG asymétrique = pas de prompt négatif.
      steps: 20
      cfg_scale: 7.0
      sampler: euler
      scheduler: auto
      width: 1024
      height: 1024
      supports_negative: false
    vram_min_gb: 10

  # --------------------------------------------------------------------------
  - id: flux2-klein-9b
    name: "Flux.2 Klein 9B"
    family: flux2
    tags: [qualité, rapide, distillé]
    description: >
      FLUX.2 Klein 9B en GGUF (distillé, rapide : 4 pas, CFG 1.0). Très haute
      qualité d'image. Diffusion Q4 ≈ 5 Go en VRAM ; encodeur Qwen3-8B déchargé
      en RAM. Tourne sur 10–12 Go de VRAM (plus lent que Z-Image).
    sources:
      diffusion:
        repo: unsloth/FLUX.2-klein-9B-GGUF
        match: "*klein-9B*{quant}.gguf"
        quantizable: true
      vae:
        # FLUX.2 partage le même autoencodeur qu'Ideogram 4 (flux2_ae).
        repo: Comfy-Org/Ideogram-4
        match: "vae/*.safetensors"
      text_encoder:
        repo: unsloth/Qwen3-8B-GGUF
        match: "Qwen3-8B-{enc_quant}.gguf"
        quantizable: true
    defaults:
      steps: 4
      cfg_scale: 1.0
      sampler: euler
      scheduler: auto
      width: 1024
      height: 1024
      supports_negative: false
    vram_min_gb: 10

# ============================================================================
#  Upscalers (PyTorch, installés à la demande via scripts/setup_upscalers.py)
# ============================================================================
upscalers:

  - id: aurasr
    name: "AuraSR v2"
    engine: pytorch
    tags: [rapide, léger, GAN, ×4]
    description: >
      Upscaler GAN (GigaGAN) en une seule passe : rapide et léger, sans NCCL ni
      flash-attn — idéal sous Windows. ×4 natif (×2/×8 dérivés). Plutôt photo.
    weights_repo: fal/AuraSR-v2
    pip_package: aura-sr
    vram_min_gb: 6

  - id: drct-l
    name: "4x DRCT-L"
    engine: spandrel
    tags: [classique, transformer, ×4, net]
    description: >
      DRCT-L ×4 (transformer dense). Upscaler « classique » net et polyvalent,
      chargé via spandrel. PyTorch, pas de flash-attn.
    pip_package: spandrel
    model_url: "https://drive.google.com/uc?id=1bVxvA6QFbne2se0CQJ-jyHFy94UOi3h5"
    model_file: "4x-DRCT-L_X4.pth"
    vram_min_gb: 8

  - id: nomos2-drct-l
    name: "4x Nomos2 HQ DRCT-L"
    engine: spandrel
    tags: [classique, transformer, ×4, photo]
    description: >
      DRCT-L finetuné sur Nomos2 (photos haute qualité), par Phhofm. Chargé via
      spandrel. PyTorch, pas de flash-attn.
    pip_package: spandrel
    model_url: "https://github.com/Phhofm/models/releases/download/4xNomos2_hq_drct-l/4xNomos2_hq_drct-l.safetensors"
    model_file: "4xNomos2_hq_drct-l.safetensors"
    vram_min_gb: 8
