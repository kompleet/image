# ============================================================================
#  GEN.Ai Image Workshop — Bibliothèque de modèles
# ----------------------------------------------------------------------------
#  Source unique de vérité : téléchargement à la demande, recommandations selon
#  le matériel, et réglages automatiques par modèle (steps/cfg/sampler/...).
#
#  Jokers dans `match` :
#    {quant}     -> quantification du modèle de diffusion (selon VRAM)
#    {enc_quant} -> quantification de l'encodeur de texte (selon RAM, en offload)
#  Le téléchargeur interroge l'API Hugging Face et choisit le meilleur fichier.
# ============================================================================

base_models:

  # --------------------------------------------------------------------------
  - id: flux1-dev
    name: "FLUX.1-dev"
    family: flux1
    tags: [qualité, photoréalisme, adhérence]
    description: >
      FLUX.1-dev (12B) en GGUF — qualité d'image et adhérence au prompt de
      référence. Non distillé : ~20 pas + guidance (≈3,5), donc plus lent que
      les modèles « turbo ». Diffusion GGUF + encodeurs T5-XXL (déchargé en RAM)
      et CLIP-L + VAE FLUX.1. Tient sur 11–12 Go (diffusion Q4 ≈ 6,8 Go).
      Légèrement filtré : pour du non censuré basé Flux.1, demandez « Chroma ».
    sources:
      diffusion:
        repo: city96/FLUX.1-dev-gguf
        match: "flux1-dev-{quant}.gguf"
        quantizable: true
      vae:
        # VAE de FLUX.1 (ae.safetensors), miroir ungated.
        repo: camenduru/FLUX.1-dev-ungated
        match: "ae.safetensors"
      t5xxl:
        repo: city96/t5-v1_1-xxl-encoder-gguf
        match: "t5-v1_1-xxl-encoder-{enc_quant}.gguf"
        quantizable: true
      clip_l:
        repo: comfyanonymous/flux_text_encoders
        match: "clip_l.safetensors"
    defaults:
      steps: 20
      cfg_scale: 1.0
      sampler: euler
      scheduler: simple
      width: 1024
      height: 1024
      supports_negative: false
    presets:
      - {name: "📷 Qualité (recommandé)", sampler: euler,   scheduler: simple, steps: 20, cfg_scale: 1.0}
      - {name: "Détaillé (dpm++ 2M)",     sampler: dpm++2m, scheduler: simple, steps: 28, cfg_scale: 1.0}
      - {name: "Brouillon rapide",        sampler: euler,   scheduler: simple, steps: 12, cfg_scale: 1.0}
    vram_min_gb: 11

