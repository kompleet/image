# ============================================================================
#  GEN.Ai Image Workshop — Bibliothèque de modèles
# ----------------------------------------------------------------------------
#  Source unique de vérité : téléchargement à la demande, recommandations selon
#  le matériel, et réglages automatiques par modèle (steps/cfg/sampler/...).
#
#  Jokers dans `match` :
#    {quant}     -> quantification du modèle de diffusion (selon VRAM)
#    {enc_quant} -> quantification de l'encodeur de texte (selon RAM, en offload)
#  Le téléchargeur interroge l'API Hugging Face et choisit le meilleur fichier.
# ============================================================================

base_models:

  # --------------------------------------------------------------------------
  - id: flux2-klein-9b
    name: "Flux.2 Klein 9B"
    family: flux2
    tags: [qualité, rapide, distillé, non-censuré]
    description: >
      FLUX.2 Klein 9B en GGUF (distillé, rapide : 4 pas, CFG 1.0). Diffusion Q4
      ≈ 5 Go en VRAM ; encodeur Qwen3-8B ABLITERÉ (non censuré) déchargé en RAM ;
      VAE flux2. Tourne dès 10–12 Go. Modèle d'ÉDITION : fournissez une image de
      référence et décrivez la modification dans le prompt.
    sources:
      diffusion:
        repo: unsloth/FLUX.2-klein-9B-GGUF
        match: "flux-2-klein-9b-{quant}.gguf"
        quantizable: true
      vae:
        repo: Comfy-Org/flux2-klein-9B
        match: "split_files/vae/flux2-vae.safetensors"
      text_encoder:
        repo: bartowski/mlabonne_Qwen3-8B-abliterated-GGUF
        match: "*Qwen3-8B-abliterated*{enc_quant}*.gguf"
        quantizable: true
    defaults:
      steps: 4
      cfg_scale: 1.0
      sampler: euler
      scheduler: simple
      width: 1024
      height: 1024
      supports_negative: false
    presets:
      - {name: "⚡ Rapide (recommandé)", sampler: euler,         scheduler: simple, steps: 4,  cfg_scale: 1.0}
      - {name: "Équilibré (res ms)",     sampler: res_multistep, scheduler: simple, steps: 6,  cfg_scale: 1.0}
      - {name: "Qualité (dpm++ 2M)",     sampler: dpm++2m,       scheduler: simple, steps: 10, cfg_scale: 1.0}
    vram_min_gb: 10

  # --------------------------------------------------------------------------
  - id: krea2
    name: "Krea 2"
    family: krea2
    tags: [qualité, photoréalisme, krea]
    description: >
      Krea 2 (base « Raw ») en GGUF — modèle Krea, supporté nativement par
      stable-diffusion.cpp. Diffusion GGUF + encodeur Qwen3-VL-4B (via --llm,
      déchargé en RAM) + VAE WAN 2.1. Réglages par défaut prudents (≈20 pas) :
      à ajuster selon tes essais.
    sources:
      diffusion:
        repo: realrebelai/KREA-2_GGUFs
        match: "*Krea-2-Raw*{quant}.gguf"
        quantizable: true
      text_encoder:
        repo: Qwen/Qwen3-VL-4B-Instruct-GGUF
        match: "*Qwen3-VL-4B-Instruct*{enc_quant}*.gguf"
        quantizable: true
      vae:
        repo: Comfy-Org/Wan_2.1_ComfyUI_repackaged
        match: "*wan_2.1_vae.safetensors"
    defaults:
      steps: 20
      cfg_scale: 1.0
      sampler: euler
      scheduler: simple
      width: 1024
      height: 1024
      supports_negative: false
    presets:
      - {name: "📷 Qualité (recommandé)", sampler: euler,   scheduler: simple, steps: 20, cfg_scale: 1.0}
      - {name: "Détaillé (dpm++ 2M)",     sampler: dpm++2m, scheduler: simple, steps: 28, cfg_scale: 1.0}
      - {name: "Brouillon rapide",        sampler: euler,   scheduler: simple, steps: 12, cfg_scale: 1.0}
    vram_min_gb: 10


# ============================================================================
#  PiD — décodeur de diffusion en espace pixel (NVIDIA), via stable-diffusion.cpp
#  Upscale rapide GPU natif : encode l'image puis décode/agrandit vers ~2K en
#  4 pas (pas de PyTorch, pas de tuiles).  doc : leejet/sd.cpp docs/pid.md
# ============================================================================
pid:
  name: "PiD — upscale rapide (NVIDIA, GPU natif)"
  target: 2048          # côté long visé (le modèle est entraîné 512->2048)
  factor: 4             # ratio fixe du modèle (512 -> 2048 = ×4)
  steps: 4
  vae_format: flux
  sources:
    diffusion:
      repo: Comfy-Org/PixelDiT
      match: "pid_flux1_512_to_2048_4step_bf16.safetensors"
    text_encoder:
      repo: Comfy-Org/PixelDiT
      match: "gemma_2_2b_it*.safetensors"
    vae:
      repo: camenduru/FLUX.1-dev-ungated
      match: "ae.safetensors"

