# ============================================================================
#  GEN.Ai Image Workshop — Bibliothèque de modèles
# ----------------------------------------------------------------------------
#  Source unique de vérité : téléchargement à la demande, recommandations selon
#  le matériel, et réglages automatiques par modèle (steps/cfg/sampler/...).
#
#  Jokers dans `match` :
#    {quant}     -> quantification du modèle de diffusion (selon VRAM)
#    {enc_quant} -> quantification de l'encodeur de texte (selon RAM, en offload)
#  Le téléchargeur interroge l'API Hugging Face et choisit le meilleur fichier.
# ============================================================================

base_models:

  # --------------------------------------------------------------------------
  - id: flux2-klein-9b
    name: "Flux.2 Klein 9B"
    family: flux2
    tags: [qualité, rapide, distillé, non-censuré]
    description: >
      FLUX.2 Klein 9B en GGUF (distillé, rapide : 4 pas, CFG 1.0). Diffusion Q4
      ≈ 5 Go en VRAM ; encodeur Qwen3-8B ABLITERÉ (non censuré) déchargé en RAM ;
      VAE flux2. Tourne dès 10–12 Go. Modèle d'ÉDITION : fournissez une image de
      référence et décrivez la modification dans le prompt.
    sources:
      diffusion:
        repo: unsloth/FLUX.2-klein-9B-GGUF
        match: "flux-2-klein-9b-{quant}.gguf"
        quantizable: true
      vae:
        repo: Comfy-Org/flux2-klein-9B
        match: "split_files/vae/flux2-vae.safetensors"
      text_encoder:
        repo: bartowski/mlabonne_Qwen3-8B-abliterated-GGUF
        match: "*Qwen3-8B-abliterated*{enc_quant}*.gguf"
        quantizable: true
    defaults:
      steps: 4
      cfg_scale: 1.0
      sampler: euler
      scheduler: simple
      width: 1024
      height: 1024
      supports_negative: false
    presets:
      - {name: "⚡ Rapide (recommandé)", sampler: euler,         scheduler: simple, steps: 4,  cfg_scale: 1.0}
      - {name: "Équilibré (res ms)",     sampler: res_multistep, scheduler: simple, steps: 6,  cfg_scale: 1.0}
      - {name: "Qualité (dpm++ 2M)",     sampler: dpm++2m,       scheduler: simple, steps: 10, cfg_scale: 1.0}
    vram_min_gb: 10


